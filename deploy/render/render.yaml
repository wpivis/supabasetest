# ReVISit — Render service definition
# Full deployment guide: deploy/render/README.md
#
# This file is a reference template. Render Blueprint auto-detection requires
# render.yaml to be at the repo root. To use Blueprint deployment, copy this
# file to the repo root. For manual service creation from the Render dashboard,
# this file is not needed at root — follow deploy/render/README.md instead.

services:
  - name: revisit
    type: web
    runtime: docker
    dockerfilePath: ./Dockerfile
    port: 80
    healthCheckPath: /
    envVars:
      # Set VITE_STORAGE_ENGINE to "supabase" (or "firebase" / "localStorage")
      - key: VITE_STORAGE_ENGINE
        value: supabase
      # Fill these in the Render dashboard — they are baked into the static bundle at build time
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
